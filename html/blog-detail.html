<!doctype html>
<html lang="az">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DigiBoom — Blog Yazısı</title>
  <link rel="shortcut icon" type="image/png" href="../assets/images/logos/favicon.svg" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/libs/aos-master/dist/aos.css">
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/digiboom-additions.css" />
</head>

<body data-active-page="blog">

  <header class="header position-fixed start-0 top-0 w-100">
    <div class="container">
      <div class="header-wrapper d-flex align-items-center justify-content-between">
        <div data-include="logo"></div>
        <div class="d-flex align-items-center gap-4">
          <div data-include="navbar"></div>
          <div data-include="sidebar"></div>
        </div>
      </div>
    </div>
  </header>

  <div class="page-wrapper overflow-hidden">

    <section class="banner-section banner-inner-section position-relative overflow-hidden d-flex align-items-end blog-detail-banner"
      style="background-image: url(../assets/images/backgrounds/blog-detail-banner.jpg);">
      <div class="container">
        <div class="d-flex flex-column gap-4 pb-5 pb-xl-10 position-relative z-1">
          <div class="row align-items-center">
            <div class="col-xl-5">
              <div class="d-flex align-items-center gap-4" data-aos="fade-up" data-aos-delay="100" data-aos-duration="1000">
                <img src="../assets/images/svgs/primary-leaf.svg" alt="" class="img-fluid animate-spin">
                <p class="mb-0 text-white fs-5 text-opacity-70">Fikirlər, <span class="text-primary">trendlər</span> və rəqəmsal dünyadan ilhamverici hekayələr.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="blog-detail-section">
      <div class="container">
        <div class="blog-detail-inner">

          <a href="blog.html" class="btn btn-back py-2 ps-3 pe-4 align-self-start" data-aos="fade-up" data-aos-delay="80" data-aos-duration="900">
            <span class="btn-text pe-1">Geri</span>
            <iconify-icon icon="lucide:arrow-up-right"
              class="btn-icon bg-white text-dark round-36 rounded-circle hstack justify-content-center fs-5 shadow-sm"></iconify-icon>
          </a>

          <div class="row g-5 g-xl-6 blog-detail-layout">
            <div class="col-lg-8">
              <article class="blog-detail-article" id="blogDetailArticle">

                <header class="blog-detail-header">
                  <span class="blog-detail-category" id="blogDetailCategory">Marketinq</span>
                  <h1 class="blog-detail-title" id="blogDetailTitle">Məqalə başlığı</h1>
                  <div class="blog-detail-meta">
                    <time class="blog-detail-date" id="blogDetailDate" datetime="2025-12-24">
                      <iconify-icon icon="lucide:calendar" aria-hidden="true"></iconify-icon>
                      <span>24 Dekabr 2025</span>
                    </time>
                    <span class="blog-detail-meta-divider" aria-hidden="true"></span>
                    <span class="blog-detail-views" id="blogDetailViews" aria-live="polite">
                      <iconify-icon icon="lucide:eye" aria-hidden="true"></iconify-icon>
                      <span class="blog-detail-views__count" id="blogViewCount">—</span>
                      <span class="blog-detail-views__label">baxış</span>
                    </span>
                  </div>
                </header>

                <figure class="blog-detail-hero" id="blogDetailHero">
                  <img src="../assets/images/resources/resources-1.jpg" alt="" class="blog-detail-hero__img" id="blogDetailImage">
                  <figcaption class="visually-hidden" id="blogDetailImageCaption"></figcaption>
                </figure>

                <div class="blog-detail-content prose" id="blogDetailContent">
                  <p>Məzmun yüklənir...</p>
                </div>

              </article>
            </div>

            <aside class="col-lg-4 blog-detail-aside">
              <div class="blog-detail-sidebar">
                <div class="blog-detail-related">
                  <div class="blog-detail-related__head">
                    <span class="blog-detail-related__eyebrow">Oxumağa davam edin</span>
                    <h2 class="blog-detail-related__title">Digər məqalələr</h2>
                  </div>
                  <ul class="blog-related-list" id="blogRelatedList" aria-label="Digər məqalələr">
                    <!-- JS ilə doldurulur -->
                  </ul>
                  <a href="blog.html" class="blog-detail-related__all">
                    Bütün məqalələr
                    <iconify-icon icon="lucide:arrow-right" aria-hidden="true"></iconify-icon>
                  </a>
                </div>
              </div>
            </aside>
          </div>

        </div>
      </div>
    </section>

  </div>

  <div data-include="footer"></div>

  <aside class="floating-widgets" aria-label="Sürətli əlaqə">
    <a href="tel:+994501234567" class="floating-widget-btn floating-widget-btn--call" aria-label="Zəng et"><iconify-icon icon="lucide:phone"></iconify-icon></a>
    <a href="https://wa.me/994501234567" target="_blank" rel="noopener" class="floating-widget-btn floating-widget-btn--whatsapp" aria-label="WhatsApp"><iconify-icon icon="mdi:whatsapp"></iconify-icon></a>
    <button type="button" class="floating-widget-btn floating-widget-btn--top" id="scrollToTopBtn" aria-label="Başa qayıt"><iconify-icon icon="lucide:arrow-up"></iconify-icon></button>
  </aside>

  <script src="../assets/libs/jquery/dist/jquery.min.js"></script>
  <script src="../assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/libs/aos-master/dist/aos.js"></script>
  <script src="../assets/js/custom.js"></script>
  <script src="../assets/js/includes.js" defer></script>
  <script src="../assets/js/digiboom.js"></script>
  <script src="../assets/js/blog-articles-data.js"></script>
  <script src="../assets/js/blog-detail.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>
</body>

</html>
